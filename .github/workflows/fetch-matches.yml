name: Maç Verilerini Güncelle
on:
  schedule:
    # Her 5 dakikada bir çalışır (GitHub'ın izin verdiği minimum)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manuel tetikleme için
#deneme# 
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4
      - name: football-data.org'dan maç verilerini al
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -s \
            -H "X-Auth-Token: $FOOTBALL_API_KEY" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            | python3 -c "
          import json, sys
          from datetime import datetime, timezone
          data = json.load(sys.stdin)
          data['fetchedAt'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False)
          print(f'Toplam maç: {len(data.get(\"matches\", []))}')
          "
      - name: data.json değiştiyse commit'le ve push'la
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Sadece değişiklik varsa commit at
          git diff --staged --quiet || git commit -m "chore: maç verileri güncellendi [skip ci]"
          git push
