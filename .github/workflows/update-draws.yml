name: Beraberlik Güncelle
on:
  workflow_dispatch:
    inputs:
      match_id:
        description: 'Maç ID'
        required: true
      action:
        description: 'add veya remove'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: draws.json güncelle
        run: |
          python3 -c "
          import json, os

          match_id = '${{ github.event.inputs.match_id }}'
          action   = '${{ github.event.inputs.action }}'

          try:
              with open('draws.json', 'r') as f:
                  draws = json.load(f)
          except:
              draws = {}

          if action == 'add':
              draws[match_id] = 'draw'
          elif action == 'remove':
              draws.pop(match_id, None)

          with open('draws.json', 'w') as f:
              json.dump(draws, f)

          print(f'draws.json güncellendi: {draws}')
          "

      - name: Commit ve push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add draws.json
          git diff --staged --quiet || git commit -m "chore: beraberlik güncellendi [skip ci]"
          git push
