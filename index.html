<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Kupası 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:DM Sans;background:#0d1117;color:#e6edf3;max-width:430px;margin:auto}
.header{padding:14px;background:#161b22;position:sticky;top:0}
.logo{font-family:Bebas Neue;font-size:22px;color:#e8a825}
.card{background:#161b22;margin:10px;border-radius:10px;padding:10px;border:1px solid #222}
.match{padding:10px;border-bottom:1px solid #222}
.team{display:flex;justify-content:space-between;font-size:14px}
.score{font-size:20px;font-family:Bebas Neue;text-align:center}
.btn{padding:5px 10px;background:#1a8c4e;border:0;color:white;border-radius:6px}
.admin{background:#111;padding:10px}
input{width:40px;text-align:center}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🏆 WORLD CUP 2026 (API)</div>
</div>

<div id="matches"></div>

<div class="card admin">
  <h4>Admin</h4>
  <div id="admin"></div>
</div>

<script>

const API_KEY = "PUT_YOUR_KEY";

let MATCHES = [];
let scores = JSON.parse(localStorage.getItem("scores") || "{}");
let live = {};

async function load() {

  const res = await fetch(
    "https://api.football-data.org/v4/competitions/WC/matches",
    { headers: { "X-Auth-Token": API_KEY } }
  );

  const data = await res.json();

  MATCHES = data.matches.map(m => ({
    id: m.id,
    home: m.homeTeam.name,
    away: m.awayTeam.name,
    date: m.utcDate
  }));

  render();
}

function save(id) {
  const h = document.getElementById("h"+id).value;
  const a = document.getElementById("a"+id).value;

  scores[id] = {home:h,away:a};
  localStorage.setItem("scores",JSON.stringify(scores));

  render();
}

function render() {

  let html = "";
  let admin = "";

  MATCHES.forEach(m => {

    const s = scores[m.id];

    html += `
      <div class="card">
        <div class="team">
          <div>${m.home}</div>
          <div>${m.away}</div>
        </div>
        <div class="score">
          ${s ? s.home + " - " + s.away : "vs"}
        </div>
      </div>
    `;

    admin += `
      <div>
        ${m.home} vs ${m.away}<br>
        <input id="h${m.id}" placeholder="0">
        -
        <input id="a${m.id}" placeholder="0">
        <button class="btn" onclick="save('${m.id}')">Kaydet</button>
        <hr>
      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
  document.getElementById("admin").innerHTML = admin;
}

async function liveScores() {

  const today = new Date().toISOString().slice(0,10);

  const res = await fetch(
    `https://api.football-data.org/v4/competitions/WC/matches?dateFrom=${today}&dateTo=${today}`,
    { headers: { "X-Auth-Token": API_KEY } }
  );

  const data = await res.json();

  data.matches.forEach(m => {

    const match = MATCHES.find(x => x.id === m.id);

    if(match && m.status === "FINISHED") {
      scores[m.id] = {
        home: m.score.fullTime.home,
        away: m.score.fullTime.away
      };
    }
  });

  localStorage.setItem("scores",JSON.stringify(scores));
  render();
}

load();
setInterval(liveScores,60000);

</script>

</body>
</html>
